name: M3U Otomatik Guncelleyici

on:
  workflow_dispatch: # Manuel başlatma butonu
  schedule:
    - cron: '0 */6 * * *' # Her 6 saatte bir çalışır

jobs:
  update-m3u:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Requests Kütüphanesini Yükle
        run: pip install requests

      - name: M3U Dosyasını İndir
        shell: python
        run: |
          import requests
          import os

          # ÖNEMLİ: Dropbox'tan aldığın 'Share' linkini buraya koy.
          # Linkin sonu mutlaka ?dl=1 ile bitmeli.
          url = "https://www.dropbox.com/s/SizinDosyaID/dosyaadi.m3u?dl=1"
          
          headers = {
              "User-Agent": "Mozilla/5.0 (Android)",
              "Accept-Encoding": "gzip",
              "Connection": "keep-alive"
          }

          try:
              print("Dosya indiriliyor...")
              # allow_redirects=True sayesinde Dropbox'ın yönlendirmelerini takip eder
              response = requests.get(url, headers=headers, timeout=60, allow_redirects=True)
              
              if response.status_code == 200:
                  # Dosyanın gerçekten veri içerip içermediğini kontrol et (en az 100kb)
                  if len(response.content) > 102400:
                      with open("tv.m3u", "wb") as f:
                          f.write(response.content)
                      print(f"Başarılı! Dosya boyutu: {len(response.content)} byte.")
                  else:
                      print("Hata: İndirilen dosya çok küçük veya boş. Yazma yapılmadı.")
              else:
                  print(f"Hata: Sunucu {response.status_code} kodu döndürdü. Link patlamış olabilir.")
          except Exception as e:
              print(f"Bağlantı hatası: {e}")

      - name: Değişiklikleri Kaydet ve Pushla
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Dosya indirilmemişse boş dosya hatası almamak için kontrol
          if [ -f tv.m3u ]; then
            git add tv.m3u
            if git diff --cached --quiet; then
              echo "Herhangi bir değişiklik tespit edilmedi."
            else
              git commit -m "Oto-Güncelleme: tv.m3u yenilendi"
              git push
            fi
          else
            echo "Dosya bulunamadı, işlem iptal."
          fi
