name: Dizi Guncelleyici

on:
  schedule:
    - cron: '0 */6 * * *' # 6 saatte bir otomatik çalışır
  workflow_dispatch: # Manuel çalıştırma butonu

jobs:
  scrape_series:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Yazma izni şart

    steps:
      - name: Kodları Çek
        uses: actions/checkout@v3

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Gereksinimleri Yükle
        run: pip install requests

      - name: Scraper Kodunu Çalıştır
        run: python diziler.py

      - name: Dosyaları Commit ve Push Yap
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Otomatik Dizi Listesi Guncellemesi (Parcali)"
          file_pattern: "*.m3u" # Tüm m3u dosyalarını otomatik yükler
